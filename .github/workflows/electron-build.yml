name: 🚀 Build JS-Innov.IA Cockpit Desktop

on:
  push:
    branches: [main]
    paths:
      - 'electron/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: 🪟 Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSInnovIA-Cockpit-Windows
          path: electron/dist/*.exe
          retention-days: 30

  build-mac:
    name: 🍎 Build Mac (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build Mac DMG
        working-directory: electron
        run: npm run build:mac

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSInnovIA-Cockpit-Mac
          path: electron/dist/*.dmg
          retention-days: 30

  release:
    name: 📦 Créer Release GitHub
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: JSInnovIA-Cockpit-Windows
          path: dist/

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: JSInnovIA-Cockpit-Mac
          path: dist/

      - name: List files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🚀 JS-Innov.IA Cockpit v1.0.${{ github.run_number }}"
          body: |
            ## JS-Innov.IA Cockpit — Release automatique

            ### 📦 Téléchargements
            - **Windows** : `.exe` installeur (double-clic pour installer)
            - **Mac** : `.dmg` (glisser dans Applications)

            ### ✅ Ce qui est inclus
            - Tableau de bord complet avec KPIs
            - CRM (Clients, Leads, Pipeline)
            - Gestion projets, tâches, devis, factures, commissions
            - **Julien AI** — agent IA intégré
            - Logo JS-Innov.IA® officiel

            ---
            *🚀 JS-Innov.IA — Intelligence artificielle amplifiée par l'humain*
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
