name: Build Electron .exe Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build Windows .exe
        run: npm run build:win

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: JSInnovIA-Cockpit-Setup-Windows
          path: electron/dist/*.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, "refs/tags/")
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.exe
          name: "JS-Innov.IA Cockpit ${{ github.ref_name }}"
          body: |
            ## JS-Innov.IA Cockpit ${{ github.ref_name }}
            
            Télécharge et lance le fichier `.exe` — installation silencieuse, raccourci bureau créé automatiquement.
            
            **Inclus :** Cockpit complet · Tray icon · Notifications Windows · Splash screen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

